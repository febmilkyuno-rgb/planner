function calcPay(){
  const rawDays = +document.getElementById('payDaysInput').value;
  const days = rawDays||savedPayDays;
  if(rawDays){savedPayDays=rawDays;localStorage.setItem('pPayDays',rawDays);}

  const p=workPeriods.find(x=>x.id===currentWorkPeriodId);if(!p)return;
  const evts=p.events||{};

  // group by jobName
  const jobMap={};
  Object.entries(evts).forEach(([di,dayEvts])=>{
    dayEvts.forEach(ev=>{
      const key=ev.jobName||ev.name||'알바';
      if(!jobMap[key])jobMap[key]={wage:ev.wage||0,totalHrs:0,daysSet:new Set()};
      jobMap[key].totalHrs+=(ev.end-ev.start);
      jobMap[key].daysSet.add(+di);
      if(ev.wage)jobMap[key].wage=ev.wage;
    });
  });

  const body=document.getElementById('payModalBody');
  let html='';
  let grandTotal=0;

  // 주당 근무일수 계산
  const totalWorkDaysPerWeek = new Set(Object.values(evts).map((_,i)=>i).filter(i=>evts[i]&&evts[i].length)).size ||
    Object.keys(evts).filter(k=>evts[k]&&evts[k].length).length;

  Object.entries(jobMap).forEach(([name,info])=>{
    // 일 근무 시간 × 입력 일수
    const daysPerWeek=info.daysSet.size;
    const totalDays=Math.round(days/7*daysPerWeek);
    const dailyHrs=daysPerWeek>0?(info.totalHrs/daysPerWeek):0;
    const monthly=Math.round(info.wage*dailyHrs*totalDays);
    grandTotal+=monthly;
    const daysLabel=[...info.daysSet].map(d=>['일','월','화','수','목','금','토'][d]).join('·');
    html+=`
      <div class="pay-job-card">
        <div class="pay-job-name">${name}</div>
        <div class="pay-job-detail">시급 ${info.wage?Number(info.wage).toLocaleString()+'원':'미입력'} · ${daysLabel} · 1회 ${dailyHrs}시간 · ${totalDays}일 근무</div>
        <div class="pay-job-amount">${monthly?monthly.toLocaleString()+'원':'시급을 입력해주세요'}</div>
      </div>
    `;
  });

  if(!Object.keys(jobMap).length){
    html='<div style="text-align:center;padding:30px;color:var(--text-hint);font-size:13px;">등록된 근무가 없어요</div>';
  } else {
    // 공제 계산 (알바별 평균 시급 가중평균)
    const totalWorkHrsAll = Object.values(jobMap).reduce((s,i)=>{
      const daysPerWeek=i.daysSet.size;
      const totalDays=Math.round(days/7*daysPerWeek);
      const dailyHrs=daysPerWeek>0?(i.totalHrs/daysPerWeek):0;
      return s+dailyHrs*totalDays;
    },0);
    const hourlyAvg = totalWorkHrsAll>0 ? grandTotal/totalWorkHrsAll : 0;
    const totalDeductHrs = deductions.reduce((s,d)=>s+d.hours,0);
    // 공제액: 시급 직접 입력시 그거 사용, 없으면 평균 시급
    const deductAmt = Math.round(deductions.reduce((s,d)=>s+d.hours*(d.wage||hourlyAvg),0));
    const finalTotal = grandTotal - deductAmt;

    if(deductions.length>0){
      let dedDetail=deductions.map(d=>{
        const w=d.wage||hourlyAvg;
        const amt=Math.round(d.hours*w);
        const wageStr=d.wage?' · '+Number(d.wage).toLocaleString()+'원/h':'';
        return '<div style="display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-top:1px solid rgba(200,136,152,0.2);">'
          +'<span>'+d.title+' ('+d.hours+'h'+wageStr+')</span>'
          +'<span style="font-weight:700;">-'+amt.toLocaleString()+'원</span>'
          +'</div>';
      }).join('');
      html+=`<div style="padding:10px 14px;background:#FEF4F6;border-radius:8px;margin-bottom:10px;color:#C88898;">
        <div style="font-size:11px;font-weight:700;margin-bottom:6px;">공제 내역</div>
        ${dedDetail}
        <div style="font-size:12px;font-weight:700;margin-top:6px;padding-top:4px;border-top:1px solid rgba(200,136,152,0.3);">합계 -${deductAmt.toLocaleString()}원</div>
      </div>`;
    }
    const strikeHTML = deductions.length>0
      ? '<div style="font-size:12px;color:var(--text-muted);text-decoration:line-through;">'+grandTotal.toLocaleString()+'원</div>'
      : '';
    html+='<div class="pay-total-row">'
      +'<div class="pay-total-label">이번 달 예상 총액</div>'
      +'<div style="text-align:right;">'+strikeHTML
      +'<div class="pay-total-amount">'+finalTotal.toLocaleString()+'원</div>'
      +'</div></div>'
      +'<div style="font-size:10px;color:var(--text-hint);margin-top:8px;text-align:right;">'+days+'일 기준 계산</div>';
  }
  body.innerHTML=html;
}

function closePayModal(){document.getElementById('payModalOverlay').classList.remove('open');}


// ── 내보내기 / 가져오기 ──
function exportData(){
  const allData={
    pData: data,
    pWeekTodos: weekTodos,
    pMonthlyTodos: monthlyTodos,
    pTTEvents: ttEvents,
    pDGoals: dGoals,
    pWorkPeriods: workPeriods,
  };
  const json = JSON.stringify(allData, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date();
  const dateStr = date.getFullYear()+'-'+String(date.getMonth()+1).padStart(2,'0')+'-'+String(date.getDate()).padStart(2,'0');
  a.href = url;
  a.download = 'planner-backup-'+dateStr+'.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importData(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);
      if(confirm('현재 데이터를 불러온 파일로 교체할까요?\n(현재 데이터는 사라져요)')){
        if(imported.pData) { data=imported.pData; localStorage.setItem('pData',JSON.stringify(data)); }
        if(imported.pWeekTodos) { weekTodos=imported.pWeekTodos; localStorage.setItem('pWeekTodos',JSON.stringify(weekTodos)); }
        if(imported.pMonthlyTodos) { monthlyTodos=imported.pMonthlyTodos; localStorage.setItem('pMonthlyTodos',JSON.stringify(monthlyTodos)); }
        if(imported.pTTEvents) { ttEvents=imported.pTTEvents; localStorage.setItem('pTTEvents',JSON.stringify(ttEvents)); }
        if(imported.pDGoals) { dGoals=imported.pDGoals; localStorage.setItem('pDGoals',JSON.stringify(dGoals)); }
        if(imported.pWorkPeriods) { workPeriods=imported.pWorkPeriods; localStorage.setItem('pWorkPeriods',JSON.stringify(workPeriods)); }
        alert('✅ 가져오기 완료! 페이지를 새로고침할게요.');
        location.reload();
      }
    } catch(err) {
      alert('파일을 읽을 수 없어요. 올바른 백업 파일인지 확인해주세요.');
    }
  };
  reader.readAsText(file);
  event.target.value='';
}
