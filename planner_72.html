<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --pink:#FEF4F6;--pink-t:#C88898;
  --sky:#EFF8FE;--sky-t:#6AAAD0;
  --mint:#EEF9F5;--mint-t:#6ABCB0;
  --yellow:#FEFDF0;--yellow-t:#C0A858;
  --lavender:#F5F0FE;--lavender-t:#A888D8;
  --peach:#FEF6F0;--peach-t:#D8A878;
  --week-bg:#F5FBF5;--week-border:#C8E8C8;--week-text:#6A9E6E;
  --border:#E8E8E8;--bg:#FAFAFA;--surface:#FFFFFF;
  --text:#2A2A2A;--text-muted:#888;--text-hint:#BBBBBB;
  --today-bg:#D6E8FF;--today-text:#3A6AAA;
  --sun:#F08080;--sat:#87AECF;
  --r:8px;
}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;font-size:14px;}

/* NAV TABS */
.tab-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.tab-btn{flex:1;padding:12px 4px 10px;border:none;background:none;font-family:inherit;font-size:11px;font-weight:600;letter-spacing:0.5px;color:var(--text-hint);cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;}
.tab-btn.active{color:var(--text);border-bottom-color:var(--text);}

/* PAGE */
.page{display:none;}.page.active{display:block;}

/* ── CALENDAR PAGE ── */
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);}
.cal-header h1{font-size:17px;font-weight:700;letter-spacing:-0.3px;}
.nav-btn{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-muted);padding:2px 10px;border-radius:6px;}

.monthly-plan{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px 14px;}
.section-label{font-size:9px;font-weight:700;letter-spacing:1.2px;color:var(--text-hint);text-transform:uppercase;margin-bottom:8px;}
.m-todo-list{display:flex;flex-direction:column;gap:5px;margin-bottom:8px;}
.m-todo-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r);font-size:12px;background:#FAFAFA;}
.m-todo-item input[type=checkbox]{accent-color:#AAA;width:14px;height:14px;cursor:pointer;flex-shrink:0;}
.m-todo-item span{flex:1;line-height:1.4;}
.m-todo-item.done span{text-decoration:line-through;opacity:0.4;}
.m-todo-del{background:none;border:none;cursor:pointer;color:var(--text-hint);font-size:14px;padding:0 2px;opacity:0;}
.m-todo-item:hover .m-todo-del{opacity:1;}
.row-add{display:flex;gap:8px;}
.row-add input{flex:1;border:1px solid var(--border);border-radius:var(--r);padding:7px 12px;font-family:inherit;font-size:12px;outline:none;background:var(--surface);color:var(--text);text-align:center;}
.row-add input:focus{border-color:#AAA;}
.row-add button,.btn-dark{background:var(--text);color:#fff;border:none;border-radius:var(--r);padding:7px 14px;font-family:inherit;font-size:12px;cursor:pointer;font-weight:600;white-space:nowrap;}

/* calendar grid */
.dow-row{display:grid;grid-template-columns:repeat(7,1fr) 130px;background:#F8F8F8;border-bottom:1px solid var(--border);}
.dow-cell{padding:6px 0;text-align:center;font-size:9px;font-weight:600;letter-spacing:0.8px;color:var(--text-muted);}
.dow-cell.sun{color:var(--sun);}.dow-cell.sat{color:var(--sat);}
.dow-week-hd{padding:6px 4px;text-align:center;font-size:9px;font-weight:700;letter-spacing:0.6px;color:var(--week-text);background:var(--week-bg);border-left:1px solid var(--week-border);}
.week-row{display:grid;grid-template-columns:repeat(7,1fr) 130px;border-bottom:1px solid var(--border);min-height:90px;}
.day-cell{border-right:1px solid var(--border);padding:4px 3px;display:flex;flex-direction:column;gap:2px;cursor:pointer;transition:background .12s;overflow:hidden;}
.day-cell:hover{background:#F5F5F5;}
.day-cell.empty{background:#FAFAFA;cursor:default;}
.day-num{font-size:12px;font-weight:500;text-align:center;width:22px;height:22px;line-height:22px;border-radius:50%;margin:0 auto 2px;flex-shrink:0;}
.day-num.today{background:var(--today-bg);color:var(--today-text);font-weight:700;}
.day-num.sun-num{color:var(--sun);}.day-num.sat-num{color:var(--sat);}
.sched-chip{font-size:9px;font-weight:600;padding:3px 6px;border-radius:3px;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;text-align:center;}
.week-todo-cell{background:var(--week-bg);border-left:1px solid var(--week-border);padding:6px 6px 4px;display:flex;flex-direction:column;gap:2px;overflow:hidden;}
.week-todo-item{font-size:10px;color:var(--week-text);display:flex;align-items:flex-start;gap:3px;line-height:1.4;}
.week-todo-item input[type=checkbox]{margin-top:1px;flex-shrink:0;accent-color:var(--week-text);width:10px;height:10px;cursor:pointer;}
.week-todo-item span{flex:1;word-break:break-all;}
.week-todo-item.done span{text-decoration:line-through;opacity:0.5;}
.week-add-btn{font-size:9px;color:var(--text-hint);background:none;border:none;cursor:pointer;text-align:left;padding:1px 0;font-family:inherit;}
.week-todo-del{background:none;border:none;cursor:pointer;color:var(--week-text);font-size:10px;padding:0 1px;opacity:0;flex-shrink:0;line-height:1;}
.week-todo-item:hover .week-todo-del{opacity:0.7;}
.week-add-btn:hover{color:var(--week-text);}

.swipe-hint{text-align:center;padding:8px;font-size:10px;color:var(--text-hint);border-top:1px solid var(--border);}

/* TODAY */
.today-section{background:var(--surface);border-top:2px solid var(--border);padding:14px 16px 24px;}
.today-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.today-label{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--text-muted);}
.today-date{font-size:12px;color:var(--text-muted);}
.todo-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);margin-bottom:6px;font-size:12px;}
.todo-item input[type=checkbox]{accent-color:#888;width:14px;height:14px;cursor:pointer;flex-shrink:0;}
.todo-item span{flex:1;line-height:1.4;}
.todo-item.done span{text-decoration:line-through;opacity:0.45;}
.todo-del{background:none;border:none;cursor:pointer;color:var(--text-hint);font-size:14px;padding:0 2px;opacity:0;}
.todo-item:hover .todo-del{opacity:1;}

/* ── TIME PLAN PAGE ── */
.tp-header{padding:14px 16px 10px;background:var(--surface);border-bottom:1px solid var(--border);}
.tp-title{font-size:15px;font-weight:700;margin-bottom:10px;}
.week-select-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.week-chip{padding:5px 12px;border-radius:20px;border:1px solid var(--border);font-size:11px;font-weight:600;cursor:pointer;background:var(--surface);color:var(--text-muted);transition:all .15s;}
.week-chip.active{background:var(--text);color:#fff;border-color:var(--text);}
.copy-btn{margin-left:auto;padding:5px 12px;border-radius:20px;border:1px solid var(--border);font-size:11px;font-weight:600;cursor:pointer;background:var(--surface);color:var(--text-muted);white-space:nowrap;}
.copy-btn:hover{background:#F5F5F5;}


.tp-month-nav{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.tp-month-nav h2{font-size:14px;font-weight:700;flex:1;text-align:center;}
.tp-nav-btn{background:none;border:none;font-size:18px;cursor:pointer;color:var(--text-muted);padding:2px 8px;border-radius:6px;}

/* timetable */
.timetable-wrap{overflow-x:hidden;background:var(--surface);}
.timetable{border-collapse:collapse;width:100%;table-layout:fixed;}
.tt-header-row{}
.tt-day-hd{padding:6px 2px;text-align:center;font-size:10px;font-weight:600;color:var(--text-muted);background:#F8F8F8;border-bottom:1px solid var(--border);}
.tt-day-hd.sun{color:var(--sun);}.tt-day-hd.sat{color:var(--sat);}
.tt-time-col{font-size:17px;font-weight:800;color:var(--text-muted);text-align:center;width:36px;background:#F5F5F5;border-right:1px solid var(--border);border-bottom:1px solid var(--border);vertical-align:middle;}
.tt-row{}
.tt-slot{border:1px solid #EEEEEE;height:56px;cursor:pointer;position:relative;transition:background .1s;overflow:visible;vertical-align:top;}
.tt-slot:hover{background:#F8F8F8;}
.tt-slot.selecting{background:#E8F4FF;}
.tt-block{position:absolute;left:1px;right:1px;border-radius:4px;font-size:11px;font-weight:600;padding:3px 5px;line-height:1.4;overflow:hidden;cursor:pointer;z-index:1;text-align:center;display:flex;align-items:center;justify-content:center;}

/* add event modal for timetable */
.tt-form{padding:12px 16px;background:#F8F8F8;border-top:1px solid var(--border);}
.tt-form input[type=text]{width:100%;border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;font-family:inherit;font-size:12px;outline:none;margin-bottom:8px;text-align:center;}
.tt-form input:focus{border-color:#AAA;}
.time-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;font-size:12px;}
.time-row select{border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-family:inherit;font-size:12px;outline:none;background:var(--surface);}
.tt-color-row{display:flex;gap:6px;margin-bottom:10px;align-items:center;}
.tt-color-dot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .12s;}
.tt-color-dot.selected{border-color:#555;transform:scale(1.15);}
.tt-actions{display:flex;gap:8px;}
.btn-ghost{background:none;border:1px solid var(--border);border-radius:var(--r);padding:7px 14px;font-family:inherit;font-size:12px;cursor:pointer;color:var(--text-muted);}

/* ── DURATION GOAL PAGE ── */
.dg-page{padding:16px;}
.dg-add-row{display:flex;gap:8px;margin-bottom:16px;}
.dg-add-row input{flex:1;border:1px solid var(--border);border-radius:var(--r);padding:9px 12px;font-family:inherit;font-size:13px;outline:none;background:var(--surface);text-align:center;}
.dg-add-row input:focus{border-color:#AAA;}
.dg-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:14px;overflow:hidden;}
.dg-color-bar{height:5px;width:100%;}
.dg-card-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 10px;border-bottom:1px solid var(--border);}
.dg-card-title{font-size:14px;font-weight:700;}
.dg-card-dates{font-size:11px;color:var(--text-muted);}
.dg-date-row{display:flex;gap:8px;align-items:center;padding:8px 14px;border-bottom:1px solid var(--border);font-size:11px;color:var(--text-muted);}
.dg-date-row input[type=date]{border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-family:inherit;font-size:11px;outline:none;color:var(--text);}
.dg-todo-list{padding:8px 14px;display:flex;flex-direction:column;gap:5px;}
.dg-todo-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r);font-size:12px;background:#FAFAFA;}
.dg-todo-item input[type=checkbox]{accent-color:#888;width:14px;height:14px;cursor:pointer;flex-shrink:0;}
.dg-todo-item span{flex:1;line-height:1.4;}
.dg-todo-item.done span{text-decoration:line-through;opacity:0.4;}
.dg-todo-del{background:none;border:none;cursor:pointer;color:var(--text-hint);font-size:14px;padding:0 2px;opacity:0;}
.dg-todo-item:hover .dg-todo-del{opacity:1;}
.dg-add-todo{display:flex;gap:6px;padding:8px 14px 12px;}
.dg-add-todo input{flex:1;border:1px solid var(--border);border-radius:var(--r);padding:7px 10px;font-family:inherit;font-size:12px;outline:none;text-align:center;}
.dg-add-todo input:focus{border-color:#AAA;}
.dg-del-card{background:none;border:none;cursor:pointer;font-size:14px;color:var(--text-hint);padding:2px 6px;}
.dg-add-monthly-btn{font-size:10px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:none;cursor:pointer;color:var(--text-muted);font-family:inherit;margin-left:8px;}
.dg-add-monthly-btn:hover{background:#F5F5F5;}
.dg-progress{height:0;margin:0;}
.dg-progress-bar{display:none;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:0 0 40px;transform:translateY(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-handle{width:36px;height:4px;background:#DDD;border-radius:2px;margin:12px auto 0;}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 10px;border-bottom:1px solid var(--border);}
.modal-title{font-size:16px;font-weight:700;}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-muted);padding:2px 6px;}
.modal-body{padding:16px 20px;}
.modal-section{margin-bottom:18px;}
.modal-section-label{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--text-hint);margin-bottom:8px;text-transform:uppercase;}
.sched-input-row{display:flex;gap:6px;align-items:center;margin-bottom:6px;}
.sched-input-row input{flex:1;border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-family:inherit;font-size:12px;outline:none;background:var(--surface);color:var(--text);text-align:center;}
.sched-input-row input:focus{border-color:#AAA;}
.color-picker{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.color-dot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .12s,border-color .12s;}
.color-dot.selected{border-color:#555;transform:scale(1.15);}
.sched-add-btn,.btn-dark{background:var(--text);color:#fff;border:none;border-radius:6px;padding:7px 14px;font-family:inherit;font-size:12px;cursor:pointer;font-weight:600;}
.sched-list-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;margin-bottom:4px;font-size:12px;}
.sched-list-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.sched-list-text{flex:1;}
.sched-del{background:none;border:none;color:var(--text-hint);cursor:pointer;font-size:13px;}
.detail-todo-list{display:flex;flex-direction:column;gap:4px;}
.detail-todo-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;background:#FAFAFA;font-size:12px;}
.detail-todo-item input[type=checkbox]{accent-color:#888;width:13px;height:13px;cursor:pointer;}
.detail-todo-item span{flex:1;}
.detail-todo-item.done span{text-decoration:line-through;opacity:0.45;}
.detail-add{display:flex;gap:6px;margin-top:6px;}
.detail-add input{flex:1;border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-family:inherit;font-size:12px;outline:none;color:var(--text);background:var(--surface);text-align:center;}
.detail-add button{background:var(--text);color:#fff;border:none;border-radius:6px;padding:7px 12px;font-family:inherit;font-size:12px;cursor:pointer;font-weight:600;}



/* memo */
.memo-area{width:100%;border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;font-family:inherit;font-size:13px;line-height:1.7;resize:none;outline:none;color:var(--text);background:var(--surface);min-height:120px;}
.memo-area:focus{border-color:#AAA;}
.memo-area::placeholder{color:var(--text-hint);}


.sync-bar{display:flex;gap:8px;padding:8px 16px;background:#FAFAFA;border-bottom:1px solid var(--border);justify-content:flex-end;}
.sync-btn{display:flex;align-items:center;gap:5px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;background:var(--surface);color:var(--text-muted);}
.sync-btn:hover{background:#F0F0F0;}
.sync-btn.export{border-color:#6ABCB0;color:#6ABCB0;}
.sync-btn.import{border-color:#6AAAD0;color:#6AAAD0;}

/* inline edit */
.todo-editing{background:var(--surface)!important;border:1.5px solid #AAA!important;}
.todo-edit-inp{flex:1;border:none;outline:none;font-family:inherit;font-size:12px;background:transparent;color:var(--text);line-height:1.4;padding:0;}
.edit-hint{font-size:9px;color:var(--text-hint);text-align:center;padding:4px 0 0;letter-spacing:0.3px;}



/* ── WORK PAGE ── */
.work-page{min-height:100vh;}

.work-action-bar{display:flex;gap:8px;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);}
.work-action-btn{flex:1;padding:8px 12px;border-radius:20px;border:1px solid var(--border);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;background:var(--surface);color:var(--text-muted);text-align:center;}
.work-action-btn.accent{background:var(--text);color:#fff;border-color:var(--text);}
.shift-day-chip{display:flex;align-items:center;gap:4px;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);font-size:12px;font-weight:600;cursor:pointer;user-select:none;transition:all .12s;}
.shift-day-chip.selected{background:var(--text);color:#fff;border-color:var(--text);}
.shift-day-chip.sun{color:var(--sun);}.shift-day-chip.sun.selected{background:var(--sun);color:#fff;border-color:var(--sun);}
.shift-day-chip.sat{color:var(--sat);}.shift-day-chip.sat.selected{background:var(--sat);color:#fff;border-color:var(--sat);}
.pay-job-card{background:#F8F8F8;border-radius:10px;padding:12px 14px;margin-bottom:10px;}
.pay-job-name{font-size:13px;font-weight:700;margin-bottom:4px;}
.pay-job-detail{font-size:11px;color:var(--text-muted);margin-bottom:8px;}
.pay-job-amount{font-size:20px;font-weight:700;color:var(--text);}
.pay-total-row{border-top:1.5px solid var(--border);padding-top:14px;margin-top:4px;display:flex;justify-content:space-between;align-items:center;}
.pay-total-label{font-size:12px;font-weight:700;color:var(--text-muted);letter-spacing:0.5px;}
.pay-total-amount{font-size:24px;font-weight:700;}

.work-top{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:44px;z-index:50;}
.work-top-title{font-size:15px;font-weight:700;}
.work-add-btn{background:var(--text);color:#fff;border:none;border-radius:20px;padding:6px 16px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:0.3px;}

/* featured card */
.work-featured{padding:14px 16px 0;}
.work-featured-label{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--text-hint);text-transform:uppercase;margin-bottom:8px;}
.work-featured-card{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:box-shadow .15s;}
.work-featured-card:hover{box-shadow:0 3px 14px rgba(0,0,0,0.08);}
.work-featured-banner{height:72px;display:flex;align-items:center;padding:0 16px;gap:12px;}
.work-featured-banner .wf-emoji{font-size:30px;}
.work-featured-banner .wf-info{flex:1;}
.work-featured-banner .wf-name{font-size:16px;font-weight:700;}
.work-featured-banner .wf-sub{font-size:11px;color:var(--text-muted);margin-top:2px;}
.work-featured-banner .wf-badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px;background:rgba(0,0,0,0.08);color:#555;letter-spacing:0.3px;}

/* mini grid preview */
.work-mini-grid{padding:10px 14px 14px;overflow-x:auto;}
.wm-grid-table{border-collapse:collapse;width:100%;min-width:260px;font-size:10px;}
.wm-grid-table th{padding:3px 4px;text-align:center;font-size:9px;font-weight:600;color:var(--text-muted);border-bottom:1px solid var(--border);}
.wm-grid-table th.sun-h{color:var(--sun);}.wm-grid-table th.sat-h{color:var(--sat);}
.wm-grid-table td{border:1px solid #EEEEEE;height:22px;position:relative;min-width:28px;}
.wm-grid-table td.tl{font-size:11px;font-weight:800;color:var(--text-muted);text-align:center;background:#F5F5F5;border:none;border-right:1px solid var(--border) !important;width:28px;vertical-align:middle;}
.wm-grid-block{position:absolute;inset:1px;border-radius:3px;font-size:10px;font-weight:700;overflow:hidden;line-height:1.2;display:flex;align-items:center;justify-content:center;text-align:center;padding:2px;}

/* list */
.work-list-section{padding:14px 16px;}
.work-list-label{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--text-hint);text-transform:uppercase;margin-bottom:10px;}
.work-list-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer;transition:background .12s;}
.work-list-item:hover{background:#F8F8F8;}
.work-list-emoji{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.work-list-info{flex:1;}
.work-list-name{font-size:13px;font-weight:700;}
.work-list-sub{font-size:11px;color:var(--text-muted);margin-top:1px;}
.work-list-star{font-size:16px;color:var(--text-hint);background:none;border:none;cursor:pointer;padding:4px;}
.work-list-star.featured{color:#F5A623;}

/* detail page */
.work-detail{display:none;background:var(--bg);min-height:100vh;}
.work-detail.open{display:block;}
.work-detail-header{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:44px;z-index:50;}
.work-back-btn{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-muted);padding:2px 6px;}
.work-detail-title{font-size:15px;font-weight:700;flex:1;}
.work-detail-edit{font-size:11px;font-weight:600;background:none;border:1px solid var(--border);border-radius:20px;padding:5px 12px;cursor:pointer;color:var(--text-muted);font-family:inherit;}

/* detail info bar */
.work-info-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;gap:16px;align-items:center;flex-wrap:wrap;}
.work-info-item{font-size:11px;color:var(--text-muted);}
.work-info-item strong{color:var(--text);font-weight:700;}
.work-info-edit-row{display:flex;gap:8px;align-items:center;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap;}
.work-info-input{border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-family:inherit;font-size:12px;outline:none;color:var(--text);background:var(--surface);text-align:center;}
.work-info-input:focus{border-color:#AAA;}

/* detail timetable */
.work-tt-wrap{overflow-x:hidden;background:var(--surface);}
.work-tt-table{border-collapse:collapse;width:100%;min-width:560px;}
.work-tt-table th{padding:6px 2px;text-align:center;font-size:10px;font-weight:600;color:var(--text-muted);background:#F8F8F8;border-bottom:1px solid var(--border);}
.work-tt-table th.sun-h{color:var(--sun);}.work-tt-table th.sat-h{color:var(--sat);}
.work-tt-table td{border:1px solid #EEEEEE;height:56px;position:relative;cursor:pointer;transition:background .1s;overflow:visible;}
.work-tt-table td:hover{background:#F8F8F8;}
.work-tt-table td.work-time-label{font-size:17px;font-weight:800;color:var(--text-muted);text-align:center;background:#F5F5F5;border-right:1px solid var(--border) !important;cursor:default;width:44px;vertical-align:middle;}
.work-tt-block{position:absolute;left:1px;right:1px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;overflow:hidden;cursor:pointer;z-index:10;text-align:center;}

/* work modals */
.work-form-bar{padding:12px 16px;background:#F8F8F8;border-top:1px solid var(--border);}
.work-form-bar input[type=text]{width:100%;border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;font-family:inherit;font-size:12px;outline:none;margin-bottom:8px;text-align:center;}
.work-form-bar input:focus{border-color:#AAA;}
.work-emoji-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.work-emoji-opt{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;border:2px solid transparent;background:#F0F0F0;transition:transform .1s,border-color .1s;}
.work-emoji-opt.selected{border-color:#555;transform:scale(1.1);}
.work-color-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.work-color-swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s;}
.work-color-swatch.selected{border-color:#555;transform:scale(1.15);}


/* ── RESPONSIVE ── */


@media (max-width: 600px) {
  /* Week To Do 칸 숨기고 아래 행으로 */


  /* 날짜 칸 */
  .day-num{font-size:11px;width:18px;height:18px;line-height:18px;}
  .sched-chip{font-size:7px;padding:1px 3px;border-radius:2px;}
  .week-row{min-height:64px;}
  .dow-cell{font-size:8px;}
  .tab-btn{font-size:9px;padding:10px 2px 8px;letter-spacing:0;}
  .monthly-plan{padding:8px 12px 10px;}
}

@media (max-width: 380px) {
  .sched-chip{font-size:6px;}
}




.modal-sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.modal-sec-label2{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--text-hint);text-transform:uppercase;}
.modal-sec-add{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border);background:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);line-height:1;transition:background .12s;}
.modal-sec-add:hover{background:var(--border);}
.modal-input-area{display:none;}
.modal-input-area.open{display:block;}


@media (max-width: 768px) {
  .dow-row{grid-template-columns:repeat(7,1fr) !important;}
  .week-row{grid-template-columns:repeat(7,1fr) !important;}
  .dow-week-hd{display:none !important;}
  .week-todo-cell{display:none !important;}
  .week-todo-btn-bar{display:flex !important;}
}
@media (min-width: 769px) {
  .week-todo-btn-bar{display:none !important;}
  .dow-week-hd{display:block !important;}
  .week-todo-cell{display:flex !important;}
}


@media (max-width: 768px) {
  /* Time Plan */
  .timetable{min-width:unset !important;width:100%;}
  .tt-header-row{grid-template-columns:28px repeat(7,1fr) !important;}
  .tt-time-col{width:28px !important;font-size:11px !important;min-width:28px !important;}
  .tt-time-col{width:28px !important;font-size:11px !important;font-weight:700;}
  .tt-slot{height:40px !important;}
  .tt-day-hd{font-size:8px !important;padding:4px 1px !important;}
  .tt-block{font-size:8px !important;padding:1px 2px !important;}

  /* Work TT */
  .work-tt-table{min-width:unset !important;width:100%;}
  .work-tt-table th{font-size:8px !important;padding:4px 1px !important;}
  .work-tt-table td{height:40px !important;}
  .work-tt-table td.work-time-label{width:28px !important;font-size:11px !important;}
  .work-tt-block{font-size:8px !important;}
}


@media (max-width: 768px) {
  .tt-row{border-bottom:1px solid #F0F0F0 !important;}
  .tt-slot{border-right:1px solid #F0F0F0 !important;}
  .tt-time-col{border-bottom:1px solid #F0F0F0 !important;border-right:1px solid #E0E0E0 !important;}
  .tt-header-row{border-bottom:1px solid var(--border) !important;}
}

/* copy modal */
.copy-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.copy-modal-overlay.open{opacity:1;pointer-events:all;}
.copy-modal{background:var(--surface);border-radius:16px;padding:20px;width:88%;max-width:340px;}
.copy-modal h3{font-size:14px;font-weight:700;margin-bottom:14px;}
.copy-week-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;max-height:220px;overflow-y:auto;}
.copy-week-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--r);border:1px solid var(--border);cursor:pointer;font-size:12px;}
.copy-week-item:hover{background:#F5F5F5;}
.copy-week-item input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:var(--text);}
.copy-actions{display:flex;gap:8px;justify-content:flex-end;}
</style>

<script>
// ── CONSTANTS ──
const COLORS=[
  {key:'pink',bg:'#FDEEF0',text:'#C07888'},
  {key:'sky',bg:'#E6F4FC',text:'#5A9CC5'},
  {key:'mint',bg:'#E2F7F0',text:'#5AADA0'},
  {key:'yellow',bg:'#FFFBE8',text:'#B09040'},
  {key:'lavender',bg:'#F2ECFC',text:'#9A78D0'},
  {key:'peach',bg:'#FFF2E8',text:'#D09060'},
];
const HOURS=Array.from({length:17},(_,i)=>i+7); // 7~23
const DAYS_KO=['일','월','화','수','목','금','토'];
const DAYS_EN=['SUN','MON','TUE','WED','THU','FRI','SAT'];

// ── STORAGE ──
let data=load('pData',{});
let weekTodos=load('pWeekTodos',{});
let monthlyTodos=load('pMonthlyTodos',{});
let todayTodos=load('pTodayTodos',{});
let ttEvents=load('pTTEvents',{});   // ttEvents[weekKey][dayIdx] = [{id,name,start,end,colorKey}]
let dGoals=load('pDGoals',[]);


function load(k,def){try{const v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch{return def;}}
function save(){
  localStorage.setItem('pData',JSON.stringify(data));
  localStorage.setItem('pWeekTodos',JSON.stringify(weekTodos));
  localStorage.setItem('pMonthlyTodos',JSON.stringify(monthlyTodos));
  localStorage.setItem('pTodayTodos',JSON.stringify(todayTodos));
  localStorage.setItem('pTTEvents',JSON.stringify(ttEvents));
  localStorage.setItem('pDGoals',JSON.stringify(dGoals));
}
function uid(){return Math.random().toString(36).slice(2,9);}
function dateKey(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function monthKey(y,m){return `${y}-${m}`;}
function weekKey(y,m,wi){return `${y}-${m}-w${wi}`;}
function colorByKey(k){return COLORS.find(c=>c.key===k)||COLORS[1];}

// ── STATE ──

const now=new Date();
let curY=now.getFullYear(),curM=now.getMonth();
const todayY=now.getFullYear(),todayM=now.getMonth(),todayD=now.getDate();
let selectedColor=COLORS[1];
let modalDateKey=null;
let ttSelectedWeek=null; // "YYYY-WW" iso week string
let tpCurY=now.getFullYear(),tpCurM=now.getMonth();
let ttSelectedColor=COLORS[0];
let ttFormDay=null,ttFormStartH=null;
let editingTTId=null;

// ── TAB ──
function switchTab(id){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',['cal','timeplan','dgoal','work'][i]===id);
  });
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if(id==='timeplan') initTimePlan();
  if(id==='dgoal') renderDGoals();
  if(id==='work') renderWork();
}

// ── INIT ──
(function init(){
  renderHeader();
  renderCalendar();
  renderTodaySection();
  loadMonthlyPlan();
  initColorPicker();

  document.getElementById('prevBtn').onclick=()=>changeMonth(-1);
  document.getElementById('nextBtn').onclick=()=>changeMonth(1);



  document.getElementById('monthlyTodoInput').addEventListener('keydown',e=>{if(e.key==='Enter')addMonthlyTodo();});
  document.getElementById('todayTodoInput').addEventListener('keydown',e=>{if(e.key==='Enter')addTodayTodo();});
  document.getElementById('schedInput').addEventListener('keydown',e=>{if(e.key==='Enter')addSched();});
  document.getElementById('detailTodoInput').addEventListener('keydown',e=>{if(e.key==='Enter')addDetailTodo();});
  document.getElementById('dgNameInput').addEventListener('keydown',e=>{if(e.key==='Enter')addDGoal();});

  // tt time selects
  const sh=document.getElementById('ttStartH'),eh=document.getElementById('ttEndH');
  // 7:00 ~ 23:30 in 30-min steps, stored as half-units (7.0, 7.5, 8.0 ...)
  const SLOTS=[];
  for(let hh=7;hh<=23;hh++){SLOTS.push(hh);SLOTS.push(hh+0.5);}
  SLOTS.push(24); // end cap
  function slotLabel(v){const hh=Math.floor(v);const mm=v%1?'30':'00';return `${String(hh).padStart(2,'0')}:${mm}`;}
  SLOTS.slice(0,-1).forEach(v=>{sh.innerHTML+=`<option value="${v}">${slotLabel(v)}</option>`;});
  SLOTS.slice(1).forEach(v=>{eh.innerHTML+=`<option value="${v}">${slotLabel(v)}</option>`;});

// ── LONG PRESS EDIT UTILITY ──
function longPress(el, cb){
  let t=null;
  const start=()=>{t=setTimeout(()=>{cb();t=null;},500);};
  const cancel=()=>{if(t){clearTimeout(t);t=null;}};
  el.addEventListener('mousedown',start);
  el.addEventListener('touchstart',start,{passive:true});
  el.addEventListener('mouseup',cancel);
  el.addEventListener('mouseleave',cancel);
  el.addEventListener('touchend',cancel);
  el.addEventListener('touchcancel',cancel);
}

function makeEditable(item, span, onSave){
  item.classList.add('todo-editing');
  const prev=span.textContent;
  const inp=document.createElement('input');
  inp.type='text';inp.className='todo-edit-inp';inp.value=prev;
  span.replaceWith(inp);
  inp.focus();inp.select();
  const hint=document.createElement('div');
  hint.className='edit-hint';hint.textContent='Enter로 저장 · Esc로 취소';
  item.appendChild(hint);
  const finish=(save)=>{
    const val=inp.value.trim()||prev;
    const newSpan=document.createElement('span');
    newSpan.textContent=save?val:prev;
    inp.replaceWith(newSpan);
    item.classList.remove('todo-editing');
    hint.remove();
    if(save&&val!==prev) onSave(val);
  };
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();finish(true);}
    if(e.key==='Escape'){finish(false);}
  });
  inp.addEventListener('blur',()=>finish(true));
}

// ── TIME PLAN ──
function getISOWeek(d){
  const date=new Date(d);date.setHours(0,0,0,0);
  date.setDate(date.getDate()+3-(date.getDay()+6)%7);
  const week1=new Date(date.getFullYear(),0,4);
  return[date.getFullYear(),1+Math.round(((date-week1)/86400000-3+(week1.getDay()+6)%7)/7)];
}
function weekStartDate(y,w){
  const simple=new Date(y,0,1+((w-1)*7));
  const dow=simple.getDay();
  const isoStart=new Date(simple);
  if(dow<=4)isoStart.setDate(simple.getDate()-simple.getDay()+1);
  else isoStart.setDate(simple.getDate()+8-simple.getDay());
  return isoStart;
}
function ttWeekKey(y,w){return `${y}-W${String(w).padStart(2,'0')}`;}

function changeTpMonth(dir){
  tpCurM+=dir;
  if(tpCurM>11){tpCurM=0;tpCurY++;}
  if(tpCurM<0){tpCurM=11;tpCurY--;}
  ttSelectedWeek=null;
  initTimePlan();
}

function initTimePlan(){
  const mo=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('tpMonthTitle').textContent=`${tpCurY}년 ${mo[tpCurM]}`;
  const row=document.getElementById('weekSelectRow');row.innerHTML='';
  const dim=new Date(tpCurY,tpCurM+1,0).getDate();
  const seenWeeks=new Set();
  const weekList=[];
  for(let d=1;d<=dim;d++){
    const dt=new Date(tpCurY,tpCurM,d);
    const[wy,wn]=getISOWeek(dt);
    const wk=ttWeekKey(wy,wn);
    if(!seenWeeks.has(wk)){seenWeeks.add(wk);weekList.push({wy,wn,wk});}
  }
  if(!ttSelectedWeek||!seenWeeks.has(ttSelectedWeek)){
    const[cy,cw]=getISOWeek(new Date());
    ttSelectedWeek=seenWeeks.has(ttWeekKey(cy,cw))?ttWeekKey(cy,cw):weekList[0].wk;
  }
  weekList.forEach(({wy,wn,wk},i)=>{
    const ws=weekStartDate(wy,wn);
    const we=new Date(ws);we.setDate(ws.getDate()+6);
    const fmt=d=>`${d.getMonth()+1}/${d.getDate()}`;
    const chip=document.createElement('button');
    chip.className='week-chip'+(wk===ttSelectedWeek?' active':'');
    chip.title=`${fmt(ws)} ~ ${fmt(we)}`;
    chip.textContent=`${i+1}주`;
    chip.onclick=()=>{ttSelectedWeek=wk;initTimePlan();};
    row.appendChild(chip);
  });
  renderTimetable();
}

function fmtT(v){const hh=Math.floor(v);const mm=v%1?'30':'00';return `${String(hh).padStart(2,'0')}:${mm}`;}

function renderTimetable(){
  const tt=document.getElementById('timetable');tt.innerHTML='';
  const[wy,wn]=ttSelectedWeek.split('-W');
  const wStart=weekStartDate(+wy,+wn);

  // thead
  const thead=document.createElement('thead');
  const hdr=document.createElement('tr');
  const timeHd=document.createElement('th');
  timeHd.className='tt-time-col';
  timeHd.style.cssText='font-size:9px;font-weight:600;color:var(--text-hint);width:36px;';
  timeHd.textContent='TIME';
  hdr.appendChild(timeHd);
  for(let i=0;i<7;i++){
    const dt=new Date(wStart);dt.setDate(wStart.getDate()+i);
    const cl=i===0?'sun':i===6?'sat':'';
    const th=document.createElement('th');
    th.className=`tt-day-hd ${cl}`;
    th.innerHTML=`${DAYS_EN[i]}<br><span style="font-size:11px;font-weight:700;color:inherit;">${dt.getDate()}</span>`;
    hdr.appendChild(th);
  }
  thead.appendChild(hdr);
  tt.appendChild(thead);

  const tbody=document.createElement('tbody');
  const evts=ttEvents[ttSelectedWeek]||{};

  HOURS.forEach(h=>{
    const row=document.createElement('tr');
    const timeCell=document.createElement('td');
    timeCell.className='tt-time-col';
    timeCell.textContent=h;
    row.appendChild(timeCell);

    for(let di=0;di<7;di++){
      const slot=document.createElement('td');slot.className='tt-slot';
      const dayEvts=evts[di]||[];
      dayEvts.forEach(ev=>{
        if(ev.start>=h && ev.start<h+1){
          const c=colorByKey(ev.colorKey);
          const block=document.createElement('div');
          block.className='tt-block';
          block.style.background=c.bg;block.style.color=c.text;
          block.style.top=`${(ev.start-h)*getSlotHeight()}px`;
          const durH=ev.end-ev.start;
          block.style.height=`${durH*getSlotHeight()-2}px`;
          block.style.left='1px';block.style.right='1px';
          block.textContent=ev.name;
          block.title=`${ev.name} ${fmtT(ev.start)}~${fmtT(ev.end)}`;
          block.onclick=(e)=>{e.stopPropagation();openTTForm(di,ev.start,ev);};
          slot.appendChild(block);
        }
        if(ev.start<h && ev.end>h){
          const c=colorByKey(ev.colorKey);
          const cont=document.createElement('div');
          cont.style.cssText=`position:absolute;left:1px;right:1px;top:0;background:${c.bg};opacity:0.85;border-radius:0;pointer-events:none;height:${Math.min(ev.end-h,1)*getSlotHeight()}px;`;
          slot.appendChild(cont);
        }
      });
      slot.addEventListener('click',()=>{
        if(slot.querySelector('.tt-block'))return;
        openTTForm(di,h,null);
      });
      row.appendChild(slot);
    }
    tbody.appendChild(row);
  });
  tt.appendChild(tbody);
}

function openTTForm(dayIdx,startH,existingEv){
  ttFormDay=dayIdx;editingTTId=existingEv?existingEv.id:null;
  const form=document.getElementById('ttForm');form.style.display='block';
  document.getElementById('ttFormLabel').textContent=existingEv?'일정 수정':`${DAYS_KO[dayIdx]}요일 새 일정`;
  document.getElementById('ttEventName').value=existingEv?existingEv.name:'';
  const sh=document.getElementById('ttStartH'),eh=document.getElementById('ttEndH');
  sh.value=existingEv?existingEv.start:startH;
  eh.value=existingEv?existingEv.end:(startH+1);
  if(existingEv){
    const c=colorByKey(existingEv.colorKey);ttSelectedColor=c;
    document.querySelectorAll('.tt-color-dot').forEach((d,i)=>{
      d.classList.toggle('selected',COLORS[i].key===c.key);
      d.style.borderColor=COLORS[i].key===c.key?COLORS[i].text:'transparent';
    });
  }
  // 요일 복사 체크박스 렌더
  const copyRow=document.getElementById('ttDayCopyRow');

    label.appendChild(cb);
    label.appendChild(document.createTextNode(day));
    copyRow.appendChild(label);
  });
  // 수정모드면 삭제 버튼 + 복사섹션 표시
  document.getElementById('ttDelBtn').style.display=existingEv?'block':'none';

  document.getElementById('ttEventName').focus();

function closeTTForm(){document.getElementById('ttForm').style.display='none';editingTTId=null;}
function deleteTTEvent(){
  if(!editingTTId)return;
  if(!confirm('이 일정을 삭제할까요?'))return;
  const dayEvts=ttEvents[ttSelectedWeek]&&ttEvents[ttSelectedWeek][ttFormDay];
  if(dayEvts){
    ttEvents[ttSelectedWeek][ttFormDay]=dayEvts.filter(e=>e.id!==editingTTId);
  }
  save();closeTTForm();renderTimetable();
}
function saveTTEvent(){
  const name=document.getElementById('ttEventName').value.trim();if(!name)return;
  const start=+document.getElementById('ttStartH').value;
  const end=+document.getElementById('ttEndH').value;
  if(end<=start){alert('종료 시간은 시작 시간보다 늦어야 해요.');return;}
  if(!ttEvents[ttSelectedWeek])ttEvents[ttSelectedWeek]={};
  if(!ttEvents[ttSelectedWeek][ttFormDay])ttEvents[ttSelectedWeek][ttFormDay]=[];
  const dayEvts=ttEvents[ttSelectedWeek][ttFormDay];
  const evObj={name,start,end,colorKey:ttSelectedColor.key};
  if(editingTTId){
    const idx=dayEvts.findIndex(e=>e.id===editingTTId);
    if(idx>=0)dayEvts[idx]={id:editingTTId,...evObj};
  } else {
    dayEvts.push({id:uid(),...evObj});
  }
  // 다른 요일 복사
  const checked=[...document.querySelectorAll('#ttDayCopyRow input:checked')];
  checked.forEach(cb=>{
    const di=+cb.dataset.di;
    if(!ttEvents[ttSelectedWeek][di])ttEvents[ttSelectedWeek][di]=[];
    ttEvents[ttSelectedWeek][di].push({id:uid(),...evObj});
  });
  save();closeTTForm();renderTimetable();
}

// copy modal
function openCopyModal(){
  const list=document.getElementById('copyWeekList');list.innerHTML='';
  // get all weeks that have data
  const allWeeks=Object.keys(ttEvents).filter(w=>w!==ttSelectedWeek);
  // also show month weeks
  const dim=new Date(curY,curM+1,0).getDate();
  const seenWeeks=new Set(allWeeks);
  for(let d=1;d<=dim;d++){
    const dt=new Date(curY,curM,d);
    const[wy,wn]=getISOWeek(dt);
    const wk=ttWeekKey(wy,wn);
    if(wk!==ttSelectedWeek)seenWeeks.add(wk);
  }
  if(seenWeeks.size===0){alert('복사할 다른 주가 없어요.');return;}
  seenWeeks.forEach(wk=>{
    const item=document.createElement('div');item.className='copy-week-item';
    const cb=document.createElement('input');cb.type='checkbox';cb.dataset.wk=wk;
    const [wy,wn]=wk.split('-W');
    const ws=weekStartDate(+wy,+wn);
    const we=new Date(ws);we.setDate(ws.getDate()+6);
    const fmt=d=>`${d.getMonth()+1}/${d.getDate()}`;
    const lbl=document.createElement('span');lbl.textContent=`${fmt(ws)} ~ ${fmt(we)} (${ttEvents[wk]?'데이터 있음':'비어있음'})`;
    item.appendChild(cb);item.appendChild(lbl);
    item.onclick=()=>{cb.checked=!cb.checked;};
    list.appendChild(item);
  });
  document.getElementById('copyModalOverlay').classList.add('open');
}
function closeCopyModal(){document.getElementById('copyModalOverlay').classList.remove('open');}
function handleCopyOverlay(e){if(e.target===document.getElementById('copyModalOverlay'))closeCopyModal();}
function doCopy(){
  const checked=[...document.querySelectorAll('.copy-week-item input:checked')].map(c=>c.dataset.wk);
  if(!checked.length){alert('복사할 주를 선택해주세요.');return;}
  const src=ttEvents[ttSelectedWeek]||{};
  checked.forEach(wk=>{
    ttEvents[wk]=JSON.parse(JSON.stringify(src));
  });
  save();closeCopyModal();alert(`${checked.length}개 주에 복사했어요!`);
}

function addGoalTodo(gid,inp){
  const text=inp.value.trim();if(!text)return;
  const g=dGoals.find(x=>x.id===gid);if(!g)return;
  g.todos.push({id:uid(),text,done:false});
  save();inp.value='';renderDGoals();
}
function deleteDGoal(gid){
  if(!confirm('이 목표를 삭제할까요?'))return;
  dGoals=dGoals.filter(x=>x.id!==gid);save();renderDGoals();
}
function updateGoalDate(gid,type,val){
  const g=dGoals.find(x=>x.id===gid);if(!g)return;
  if(type==='start')g.startDate=val;else g.endDate=val;
  save();
  // 날짜 표시 업데이트
  const disp=document.getElementById('dgDateDisplay-'+gid);
  if(disp){
    const span=disp.querySelector('span');
    if(span)span.textContent=(g.startDate||'?')+' ~ '+(g.endDate||'?');
  }
}

function toggleDGDateEdit(gid){
  const disp=document.getElementById('dgDateDisplay-'+gid);
  const edit=document.getElementById('dgDateEdit-'+gid);
  if(!disp||!edit)return;
  const editing=edit.style.display!=='none';
  disp.style.display=editing?'':'none';
  edit.style.display=editing?'none':'';
}
function addGoalToMonthly(gid){
  const g=dGoals.find(x=>x.id===gid);if(!g)return;
  const key=monthKey(curY,curM);
  if(!monthlyTodos[key])monthlyTodos[key]=[];
  // add uncompleted todos
  const added=g.todos.filter(t=>!t.done).map(t=>({id:uid(),text:`[${g.name}] ${t.text}`,done:false}));
  if(!added.length){alert('추가할 미완료 목표가 없어요.');return;}
  monthlyTodos[key].push(...added);
  save();alert(`${added.length}개를 ${curY}년 ${curM+1}월 Monthly Plan에 추가했어요!`);
}

function buildMiniGrid(p){

    tc.textContent=h;

    for(let di=0;di<7;di++){
      const td = document.createElement('td');

          block.style.background=c.bg;block.style.color=c.text;
          const slotH=getSlotHeight();
          block.style.top=`${(ev.start-h)*slotH}px`;
          block.style.left='1px';block.style.right='1px';
          const durH=ev.end-ev.start;
          block.style.height=`${durH*slotH-2}px`;
          block.textContent=ev.name;
          block.title=`${ev.name} ${wFmt(ev.start)}~${wFmt(ev.end)}`;
          block.onclick=e=>{e.stopPropagation();openWorkShiftModal(di,ev);};
          td.appendChild(block);
        }
        // continuation blocks
        if(ev.start<h && ev.end>h){
          const c=colorByKeyW(ev.colorKey);
          const cont=document.createElement('div');
          cont.style.cssText=`position:absolute;left:1px;right:1px;top:0;background:${c.bg};opacity:0.85;border-radius:0;pointer-events:none;height:${Math.min(ev.end-h,1)*getSlotHeight()}px;`;
          td.appendChild(cont);
        }
      });
      td.addEventListener('click',()=>{
        if(td.querySelector('.work-tt-block'))return;
        openWorkShiftModal(di,null);
      });
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
}

function renderWorkSummary(p){
  let el=document.getElementById('workSummaryBar');
  if(!el){
    el=document.createElement('div');
    el.id='workSummaryBar';
    el.style.cssText='padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);cursor:pointer;';
    el.onclick=()=>{
      const det=document.getElementById('workSummaryDetail');
      if(det)det.style.display=det.style.display==='none'?'block':'none';
    };
    const wrap=document.getElementById('workDetailView');
    const ttWrap=document.getElementById('workTTTable').parentElement;
    wrap.insertBefore(el,ttWrap);
  }
  const evts=p.events||{};
  // calc per job
  const jobMap={};
  let totalHrs=0;
  Object.entries(evts).forEach(([di,dayEvts])=>{
    dayEvts.forEach(ev=>{
      const hrs=ev.end-ev.start;
      totalHrs+=hrs;
      const key=ev.jobName||ev.name||'기타';
      if(!jobMap[key])jobMap[key]=0;
      jobMap[key]+=hrs;
    });
  });
  const fmt=h=>Number.isInteger(h)?`${h}시간`:`${Math.floor(h)}시간 30분`;
  let summaryHTML=`<div style="display:flex;align-items:center;justify-content:space-between;">
    <div>
      <span style="font-size:9px;font-weight:700;letter-spacing:1px;color:var(--text-hint);text-transform:uppercase;">주간 총 근무</span>
      <span style="font-size:18px;font-weight:700;margin-left:10px;color:var(--text);">${fmt(totalHrs)}</span>
    </div>
    <span style="font-size:11px;color:var(--text-hint);">자세히 ▾</span>
  </div>`;

  // detail (hidden by default)
  let detHTML=`<div id="workSummaryDetail" style="display:none;margin-top:10px;display:none;">`;
  Object.entries(jobMap).forEach(([name,hrs])=>{
    detHTML+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-top:1px solid var(--border);font-size:13px;">
      <span style="font-weight:600;">${name}</span>
      <span style="color:var(--text-muted);">${fmt(hrs)}</span>
    </div>`;
  });
  detHTML+=`</div>`;

  el.innerHTML=summaryHTML+detHTML;
  // re-bind click after innerHTML reset
  el.onclick=()=>{
    const det=document.getElementById('workSummaryDetail');
    if(det){det.style.display=det.style.display==='none'?'block':'none';}
  };
}

// ── SHIFT MODAL ──
let shiftSelectedDays = [];
let shiftSelectedColor = COLORS[1];
let editingShiftId = null;
let editingShiftDay = null;

function openWorkShiftModal(di, existingEv){
  editingShiftId = existingEv ? existingEv.id : null;
  editingShiftDay = di != null ? di : null;
  shiftSelectedDays = di != null ? [di] : [];
  shiftSelectedColor = existingEv ? colorByKeyW(existingEv.colorKey) : COLORS[1];

  document.getElementById('shiftModalTitle').textContent = existingEv ? '근무 수정' : '근무 추가';
  document.getElementById('shiftJobName').value = existingEv ? (existingEv.jobName||existingEv.name||'') : '';
  document.getElementById('shiftWage').value = existingEv ? (existingEv.wage||'') : '';

  // suggest past job names
  const p = workPeriods.find(x=>x.id===currentWorkPeriodId);
  const pastNames = [...new Set(Object.values(p?.events||{}).flat().map(e=>e.jobName).filter(Boolean))];
  const sug = document.getElementById('shiftJobSuggest'); sug.innerHTML='';
  pastNames.forEach(n=>{
    const chip = document.createElement('button');
    chip.style.cssText='border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:11px;cursor:pointer;background:var(--surface);font-family:inherit;';
    chip.textContent=n;
    chip.onclick=()=>{
      document.getElementById('shiftJobName').value=n;
      const wageMatch=Object.values(p.events||{}).flat().find(e=>e.jobName===n&&e.wage);
      if(wageMatch)document.getElementById('shiftWage').value=wageMatch.wage||'';
    };
    sug.appendChild(chip);
  });

  // day chips
  const dayRow=document.getElementById('shiftDayRow'); dayRow.innerHTML='';
  ['일','월','화','수','목','금','토'].forEach((d,i)=>{
    const cl=i===0?'sun':i===6?'sat':'';
    const chip=document.createElement('div');
    chip.className='shift-day-chip '+cl+(shiftSelectedDays.includes(i)?' selected':'');
    chip.textContent=d;
    chip.onclick=()=>{
      if(editingShiftId){return;}  // editing: single day fixed
      if(shiftSelectedDays.includes(i)){shiftSelectedDays=shiftSelectedDays.filter(x=>x!==i);}
      else{shiftSelectedDays.push(i);}
      renderShiftDayChips();
    };
    dayRow.appendChild(chip);
  });

  // time selects
  const ss=document.getElementById('shiftStart'),es=document.getElementById('shiftEnd');
  ss.innerHTML='';es.innerHTML='';
  const WSLOTS=[];for(let hh=8;hh<=21;hh++){WSLOTS.push(hh);if(hh<21)WSLOTS.push(hh+0.5);}
  WSLOTS.forEach(v=>{ss.innerHTML+=`<option value="${v}">${wFmt(v)}</option>`;});
  WSLOTS.slice(1).forEach(v=>{es.innerHTML+=`<option value="${v}">${wFmt(v)}</option>`;});
  ss.value=existingEv?existingEv.start:10;
  es.value=existingEv?existingEv.end:18;
  ss.onchange=()=>{if(+es.value<=+ss.value)es.value=+ss.value+0.5;};

  // color row
  const cr=document.getElementById('shiftColorRow');cr.innerHTML='';
  COLORS.forEach((c,i)=>{
    const dot=document.createElement('div');
    dot.style.cssText=`width:22px;height:22px;border-radius:50%;background:${c.bg};cursor:pointer;border:2px solid ${shiftSelectedColor.key===c.key?c.text:'transparent'};transition:transform .1s;`;
    dot.onclick=()=>{
      shiftSelectedColor=c;
      cr.querySelectorAll('div').forEach((d,j)=>{d.style.borderColor=COLORS[j].key===c.key?COLORS[j].text:'transparent';});
    };
    cr.appendChild(dot);
  });

  document.getElementById('shiftDelBtn').style.display=existingEv?'block':'none';
  document.getElementById('shiftModalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('shiftJobName').focus(),300);
}

function renderShiftDayChips(){
  document.querySelectorAll('.shift-day-chip').forEach((chip,i)=>{
    chip.classList.toggle('selected', shiftSelectedDays.includes(i));
  });
}

function closeWorkShiftModal(){document.getElementById('shiftModalOverlay').classList.remove('open');}
function handleShiftOverlay(e){if(e.target===document.getElementById('shiftModalOverlay'))closeWorkShiftModal();}

function saveShift(){
  const jobName=document.getElementById('shiftJobName').value.trim();if(!jobName){alert('알바 이름을 입력해주세요.');return;}
  const wage=+document.getElementById('shiftWage').value||0;
  const start=+document.getElementById('shiftStart').value;
  const end=+document.getElementById('shiftEnd').value;
  if(end<=start){alert('종료 시간이 시작 시간보다 늦어야 해요.');return;}
  if(!editingShiftId && shiftSelectedDays.length===0){alert('요일을 선택해주세요.');return;}
  const p=workPeriods.find(x=>x.id===currentWorkPeriodId);if(!p)return;
  if(!p.events)p.events={};
  const evObj={jobName,wage,start,end,colorKey:shiftSelectedColor.key,name:jobName};

  if(editingShiftId){
    // update single event
    const dayEvts=p.events[editingShiftDay]||[];
    const idx=dayEvts.findIndex(e=>e.id===editingShiftId);
    if(idx>=0)dayEvts[idx]={id:editingShiftId,...evObj};
  } else {
    shiftSelectedDays.forEach(di=>{
      if(!p.events[di])p.events[di]=[];
      p.events[di].push({id:uid(),...evObj});
    });
  }
  saveWorkData();closeWorkShiftModal();renderWorkTT(p);
}

function deleteShift(){
  if(!editingShiftId)return;
  if(!confirm('이 근무를 삭제할까요?'))return;
  const p=workPeriods.find(x=>x.id===currentWorkPeriodId);if(!p)return;
  p.events[editingShiftDay]=(p.events[editingShiftDay]||[]).filter(e=>e.id!==editingShiftId);
  saveWorkData();closeWorkShiftModal();renderWorkTT(p);
}

// ── PAY MODAL ──
// 일수 영구 저장
let savedPayDays = +localStorage.getItem('pPayDays')||26;

// 공제 내역 저장
let deductions = []; // [{id,title,hours}] — 모달 열 때마다 유지

function openPayModal(){
  document.getElementById('payDaysInput').value = savedPayDays;
  renderDeductionList();
  calcPay();
  document.getElementById('payModalOverlay').classList.add('open');
}

function renderDeductionList(){
  const list = document.getElementById('deductionList');
  list.innerHTML='';
  deductions.forEach(d=>{
    const row=document.createElement('div');
    row.style.cssText='display:flex;align-items:center;gap:8px;padding:6px 10px;background:#FEF4F6;border-radius:6px;font-size:12px;';
    row.innerHTML=`<span style="flex:1;">${d.title}</span><span style="font-size:11px;color:var(--text-muted);margin-right:4px;">${d.wage?Number(d.wage).toLocaleString()+'원/h':''}</span><span style="color:#C88898;font-weight:700;">-${d.hours}시간</span>`;
    const del=document.createElement('button');
    del.style.cssText='background:none;border:none;cursor:pointer;color:var(--text-hint);font-size:14px;padding:0 2px;';
    del.textContent='×';
    del.onclick=()=>{deductions=deductions.filter(x=>x.id!==d.id);renderDeductionList();calcPay();};
    row.appendChild(del);
    list.appendChild(row);
  });
}

function addDeduction(){
  const title=document.getElementById('deductTitle').value.trim()||'공제';
  const hours=+document.getElementById('deductHours').value;
  const wage=+document.getElementById('deductWage').value||0;
  if(!hours){alert('시간을 입력해주세요.');return;}
  deductions.push({id:Math.random().toString(36).slice(2),title,hours,wage});
  document.getElementById('deductTitle').value='';
  document.getElementById('deductHours').value='';
  document.getElementById('deductWage').value='';
  renderDeductionList();calcPay();
}

function calcPay(){
  const rawDays = +document.getElementById('payDaysInput').value;
  const days = rawDays||savedPayDays;
  if(rawDays){savedPayDays=rawDays;localStorage.setItem('pPayDays',rawDays);}

  const p=workPeriods.find(x=>x.id===currentWorkPeriodId);if(!p)return;
  const evts=p.events||{};

  // group by jobName
  const jobMap={};
  Object.entries(evts).forEach(([di,dayEvts])=>{
    dayEvts.forEach(ev=>{
      const key=ev.jobName||ev.name||'알바';
      if(!jobMap[key])jobMap[key]={wage:ev.wage||0,totalHrs:0,daysSet:new Set()};
      jobMap[key].totalHrs+=(ev.end-ev.start);
      jobMap[key].daysSet.add(+di);
      if(ev.wage)jobMap[key].wage=ev.wage;
    });
  });

  const body=document.getElementById('payModalBody');
  let html='';
  let grandTotal=0;

  // 주당 근무일수 계산
  const totalWorkDaysPerWeek = new Set(Object.values(evts).map((_,i)=>i).filter(i=>evts[i]&&evts[i].length)).size ||
    Object.keys(evts).filter(k=>evts[k]&&evts[k].length).length;

  Object.entries(jobMap).forEach(([name,info])=>{
    // 일 근무 시간 × 입력 일수
    const daysPerWeek=info.daysSet.size;
    const totalDays=Math.round(days/7*daysPerWeek);
    const dailyHrs=daysPerWeek>0?(info.totalHrs/daysPerWeek):0;
    const monthly=Math.round(info.wage*dailyHrs*totalDays);
    grandTotal+=monthly;
    const daysLabel=[...info.daysSet].map(d=>['일','월','화','수','목','금','토'][d]).join('·');
    html+=`
      <div class="pay-job-card">
        <div class="pay-job-name">${name}</div>
        <div class="pay-job-detail">시급 ${info.wage?Number(info.wage).toLocaleString()+'원':'미입력'} · ${daysLabel} · 1회 ${dailyHrs}시간 · ${totalDays}일 근무</div>
        <div class="pay-job-amount">${monthly?monthly.toLocaleString()+'원':'시급을 입력해주세요'}</div>
      </div>
    `;
  });

  if(!Object.keys(jobMap).length){
    html='<div style="text-align:center;padding:30px;color:var(--text-hint);font-size:13px;">등록된 근무가 없어요</div>';
  } else {
    // 공제 계산 (알바별 평균 시급 가중평균)
    const totalWorkHrsAll = Object.values(jobMap).reduce((s,i)=>{
      const daysPerWeek=i.daysSet.size;
      const totalDays=Math.round(days/7*daysPerWeek);
      const dailyHrs=daysPerWeek>0?(i.totalHrs/daysPerWeek):0;
      return s+dailyHrs*totalDays;
    },0);
    const hourlyAvg = totalWorkHrsAll>0 ? grandTotal/totalWorkHrsAll : 0;
    const totalDeductHrs = deductions.reduce((s,d)=>s+d.hours,0);
    // 공제액: 시급 직접 입력시 그거 사용, 없으면 평균 시급
    const deductAmt = Math.round(deductions.reduce((s,d)=>s+d.hours*(d.wage||hourlyAvg),0));
    const finalTotal = grandTotal - deductAmt;

    if(deductions.length>0){
      let dedDetail=deductions.map(d=>{
        const w=d.wage||hourlyAvg;
        const amt=Math.round(d.hours*w);
        const wageStr=d.wage?' · '+Number(d.wage).toLocaleString()+'원/h':'';
        return '<div style="display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-top:1px solid rgba(200,136,152,0.2);">'
          +'<span>'+d.title+' ('+d.hours+'h'+wageStr+')</span>'
          +'<span style="font-weight:700;">-'+amt.toLocaleString()+'원</span>'
          +'</div>';
      }).join('');
      html+=`<div style="padding:10px 14px;background:#FEF4F6;border-radius:8px;margin-bottom:10px;color:#C88898;">
        <div style="font-size:11px;font-weight:700;margin-bottom:6px;">공제 내역</div>
        ${dedDetail}
        <div style="font-size:12px;font-weight:700;margin-top:6px;padding-top:4px;border-top:1px solid rgba(200,136,152,0.3);">합계 -${deductAmt.toLocaleString()}원</div>
      </div>`;
    }
    const strikeHTML = deductions.length>0
      ? '<div style="font-size:12px;color:var(--text-muted);text-decoration:line-through;">'+grandTotal.toLocaleString()+'원</div>'
      : '';
    html+='<div class="pay-total-row">'
      +'<div class="pay-total-label">이번 달 예상 총액</div>'
      +'<div style="text-align:right;">'+strikeHTML
      +'<div class="pay-total-amount">'+finalTotal.toLocaleString()+'원</div>'
      +'</div></div>'
      +'<div style="font-size:10px;color:var(--text-hint);margin-top:8px;text-align:right;">'+days+'일 기준 계산</div>';
  }
  body.innerHTML=html;
}

function exportData(){
  const allData={
    pData: data,
    pWeekTodos: weekTodos,
    pMonthlyTodos: monthlyTodos,
    pTTEvents: ttEvents,
    pDGoals: dGoals,
    pWorkPeriods: workPeriods,
  };
  const json = JSON.stringify(allData, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date();
  const dateStr = date.getFullYear()+'-'+String(date.getMonth()+1).padStart(2,'0')+'-'+String(date.getDate()).padStart(2,'0');
  a.href = url;
  a.download = 'planner-backup-'+dateStr+'.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importData(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);
      if(confirm('현재 데이터를 불러온 파일로 교체할까요?\n(현재 데이터는 사라져요)')){
        if(imported.pData) { data=imported.pData; localStorage.setItem('pData',JSON.stringify(data)); }
        if(imported.pWeekTodos) { weekTodos=imported.pWeekTodos; localStorage.setItem('pWeekTodos',JSON.stringify(weekTodos)); }
        if(imported.pMonthlyTodos) { monthlyTodos=imported.pMonthlyTodos; localStorage.setItem('pMonthlyTodos',JSON.stringify(monthlyTodos)); }
        if(imported.pTTEvents) { ttEvents=imported.pTTEvents; localStorage.setItem('pTTEvents',JSON.stringify(ttEvents)); }
        if(imported.pDGoals) { dGoals=imported.pDGoals; localStorage.setItem('pDGoals',JSON.stringify(dGoals)); }
        if(imported.pWorkPeriods) { workPeriods=imported.pWorkPeriods; localStorage.setItem('pWorkPeriods',JSON.stringify(workPeriods)); }
        alert('✅ 가져오기 완료! 페이지를 새로고침할게요.');
        location.reload();
      }
    } catch(err) {
      alert('파일을 읽을 수 없어요. 올바른 백업 파일인지 확인해주세요.');
    }
  };
  reader.readAsText(file);
  event.target.value='';
}
